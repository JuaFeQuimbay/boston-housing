version: "3.9"

services:
  housing-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: housing-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_VERSION=v1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000