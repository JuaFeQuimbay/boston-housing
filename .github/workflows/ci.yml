name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model artifact
        run: |
          python -m src.train

      - name: Run tests
        run: |
          pytest tests/

      - name: Validate FastAPI app import
        run: |
          python -c "from app.main import app; print('FastAPI app loaded successfully')"

      - name: Validate Docker build
        run: |
          docker build -t housing-api-test .